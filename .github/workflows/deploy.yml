name: Deploy to AWS

on:
  push:
    branches: [main, dev, staging]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS connection
        run: aws sts get-caller-identity

      - name: Sync data files to S3
        run: |
          for source in cbre-living cushman-wakefield foxtons hamptons jll-residential knight-frank purple-bricks right-move savills strutt-parker; do
            if [ -d "data/$source" ]; then
              aws s3 sync data/$source/ s3://marketflow-property-intelligence-data/$source/raw-data/ \
                --exclude "*" \
                --include "*.csv" \
                --include "*.json" \
                --include "*.parquet" \
                --include "*.xlsx" \
                --delete
              echo "✓ Synced $source to S3"
            else
              echo "⚠ Skipped $source — folder not found in repo"
            fi
          done
